<div class="bg-gray-50 min-h-screen">
    <main class="overflow-hidden">
        <!-- Hero Section -->
        <div class="relative bg-cover bg-center text-white py-32 md:py-48 px-6 shadow-lg"
            style="background-image: url('https://images.unsplash.com/photo-1505740420928...')">
            <div class="absolute inset-0 bg-gradient-to-r from-black/70 to-black/40"></div>
            <div class="relative container mx-auto text-center max-w-4xl">
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold mb-6 leading-tight tracking-tight">Discover
                    Your Next Favorite</h1>
                <a routerLink="/shop"
                    class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full text-lg shadow-lg">Shop
                    Now</a>
            </div>
        </div>

        <!-- Category Showcase -->
        <section class="py-16 bg-gradient-to-b from-gray-50 to-white">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-14">
                    <h2 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-3">Explore Our Collections</h2>
                    <div class="w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
                </div>

                <div *ngIf="categoriesData.length > 0; else noCategories"
                    class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 md:gap-8">

                    <a *ngFor="let category of categoriesData" [routerLink]="['/shop']"
                        [queryParams]="{category: encodeCategory(category.name)}"
                        class="group flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden transition-all duration-300 hover:-translate-y-2 border border-gray-100">
                        <div class="h-48 w-full overflow-hidden">
                            <img [src]="category.image" [alt]="category.title" (error)="handleImageError($event)"
                                class="w-full h-full object-cover object-center transition-transform duration-500 group-hover:scale-110" />
                        </div>
                        <div class="p-5 text-center">
                            <h3
                                class="text-xl font-bold text-gray-800 group-hover:text-blue-600 transition-colors duration-300">
                                {{ category.title }}</h3>
                        </div>
                    </a>

                </div>

                <ng-template #noCategories>
                    <p class="text-center text-gray-600 text-lg">No categories to display at the moment.</p>
                </ng-template>
            </div>
        </section>
    </main>
</div>
