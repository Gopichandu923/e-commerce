<div class="bg-gray-50 min-h-screen">
    <main class="overflow-hidden">
        <div class="relative bg-cover bg-center text-white py-32 px-6 shadow-lg"
            style="background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600')">
            <div class="absolute inset-0 bg-black/50"></div>
            <div class="relative container mx-auto text-center">
                <h1 class="text-5xl font-extrabold mb-6 leading-tight">Discover Your Next Favorite</h1>
                <a routerLink="/products"
                    class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full transition-transform hover:scale-105">
                    Shop Now
                </a>
            </div>
        </div>

        <section class="py-16">
            <div class="container mx-auto px-4">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-bold text-gray-900">Explore Our Collections</h2>
                    <div class="w-16 h-1 bg-blue-500 mx-auto mt-2"></div>
                </div>

                <div *ngIf="categoriesData && categoriesData.length > 0; else noCategories"
                    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">

                    <a *ngFor="let category of categoriesData" [routerLink]="['/products']"
                        [queryParams]="{ category: encodeCategory(category.name) }"
                        class="group bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 transition-all hover:-translate-y-1">

                        <div class="h-48 overflow-hidden">
                            <img [src]="category.image" [alt]="category.title" (error)="handleImageError($event)"
                                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                        </div>

                        <div
                            class="p-5 text-center font-bold text-xl text-gray-800 group-hover:text-blue-600 transition-colors">
                            {{ category.title }}
                        </div>
                    </a>
                </div>

                <ng-template #noCategories>
                    <p class="text-center text-gray-600">No categories to display at the moment.</p>
                </ng-template>
            </div>
        </section>
    </main>
</div>
