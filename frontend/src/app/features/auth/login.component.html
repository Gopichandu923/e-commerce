<div class="flex justify-center items-center min-h-screen bg-gray-50 p-5 font-sans">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-10 transition-all">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-semibold text-gray-800 mb-2">Welcome Back</h1>
            <p class="text-gray-600 text-base">Sign in to continue to your account</p>
        </div>

        @if (successMessage) {
        <div class="bg-green-500 text-white p-3 rounded-lg text-center mb-5 text-sm">
            {{ successMessage }}
        </div>
        }

        @if (errorMessage) {
        <div class="bg-red-400 text-white p-3 rounded-lg text-center mb-5 text-sm">
            {{ errorMessage }}
        </div>
        }

        <form (submit)="handleSubmit($event)">
            <div class="mb-6">
                <label for="email" class="block mb-2 font-medium text-gray-700 text-sm">
                    Email Address
                </label>
                <input type="email" id="email" name="email" [(ngModel)]="formData.email" (input)="handleChange($event)"
                    [class.border-red-500]="errors.email"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 text-gray-700 bg-gray-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition"
                    placeholder="john@example.com" />
                @if (errors.email) {
                <span class="text-red-500 text-sm mt-1 block">{{ errors.email }}</span>
                }
            </div>

            <div class="mb-6">
                <label for="password" class="block mb-2 font-medium text-gray-700 text-sm">
                    Password
                </label>
                <input type="password" id="password" name="password" [(ngModel)]="formData.password"
                    (input)="handleChange($event)" [class.border-red-500]="errors.password"
                    class="w-full px-4 py-3 pr-10 rounded-lg border border-gray-300 text-gray-700 bg-gray-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition"
                    placeholder="Enter your password" />
                @if (errors.password) {
                <span class="text-red-500 text-sm mt-1 block">{{ errors.password }}</span>
                }
            </div>

            <div class="flex items-center my-4">
                <input type="checkbox" id="remember" class="w-4 h-4 mr-2 cursor-pointer" />
                <label for="remember" class="text-gray-700 text-sm cursor-pointer">
                    Remember me
                </label>
                <a href="/forgot-password" class="ml-auto text-blue-500 text-sm hover:underline">
                    Forgot password?
                </a>
            </div>

            <button type="submit" [disabled]="loading"
                class="w-full py-3.5 rounded-lg text-white font-semibold text-base mt-4 transition bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed">
                @if (loading) {
                <span>Signing in...</span>
                } @else {
                <span>Sign In</span>
                }
            </button>
        </form>

        <div class="text-center mt-6 text-gray-600 text-base">
            <p>
                Don't have an account?
                <a href="/register" class="text-blue-500 font-medium hover:underline">Sign Up</a>
            </p>
        </div>
    </div>
</div>
