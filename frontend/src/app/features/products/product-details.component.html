<div *ngIf="loading" class="container mx-auto p-8 text-center text-xl">
  Loading product details...
</div>

<div *ngIf="error || !product" class="container mx-auto p-8 text-center text-red-500 text-xl">
  Error: {{ error || 'Product not found.' }}
</div>

<div *ngIf="!loading && product" class="container mx-auto p-4 sm:p-6 lg:p-8">
  <!-- Back Button (Optional logic in component for navigate) -->
  <button routerLink="/products"
    class="mb-6 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-gray-600 hover:bg-gray-700">
    <svg class="-ml-1 mr-2 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd"
        d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"
        clip-rule="evenodd" />
    </svg>
    Back
  </button>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12 mb-12">
    <!-- Image -->
    <div class="bg-gray-100 rounded-lg p-4 flex justify-center items-center shadow-lg">
      <img [src]="product.image || 'https://via.placeholder.com/600x600?text=No+Image'" [alt]="product.name"
        class="max-w-full max-h-[70vh] object-contain rounded-md" />
    </div>

    <!-- Details -->
    <div class="flex flex-col justify-between">
      <div>
        <p class="text-sm text-gray-500 mb-1">
          {{ product.category | titlecase }}
          <span *ngIf="product.brand"> | {{ product.brand }}</span>
        </p>
        <h1 class="text-3xl lg:text-4xl font-bold text-gray-800 mb-3">{{ product.name }}</h1>

        <p class="text-3xl font-semibold text-blue-600 mb-4">${{ product.price | number:'1.2-2' }}</p>
        <p class="text-gray-700 leading-relaxed mb-6">{{ product.description }}</p>

        <p [ngClass]="product.countInStock > 0 ? 'text-green-600' : 'text-red-600'" class="mb-1 font-semibold">
          {{ product.countInStock > 0 ? product.countInStock + ' In Stock' : 'Out of Stock' }}
        </p>
      </div>

      <!-- Action Buttons -->
      <div class="mt-auto">
        <div *ngIf="product.countInStock > 0" class="flex items-center mb-6 space-x-4">
          <label for="quantity" class="font-medium text-gray-700">Quantity:</label>
          <input type="number" id="quantity" [(ngModel)]="quantity" min="1" [max]="product.countInStock"
            class="p-2 border border-gray-300 rounded-md w-20 text-center" />
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <button [disabled]="product.countInStock === 0"
            class="flex-1 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
            <!-- Cart Icon SVG -->
            <svg class="mr-2 h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
            </svg>
            Add to Cart
          </button>

          <button [disabled]="favoriteProcessing"
            class="flex-1 flex items-center justify-center border-2 border-gray-300 text-gray-700 hover:bg-gray-100 font-semibold py-3 px-6 rounded-lg shadow-sm disabled:opacity-50 transition-colors">
            <!-- Heart Icon SVG -->
            <svg class="mr-2 h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z">
              </path>
            </svg>
            {{ favoriteProcessing ? 'Adding...' : 'Add to Favorites' }}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
