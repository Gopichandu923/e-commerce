<div *ngIf="loading" class="container mx-auto p-4 text-center text-xl">Loading products...</div>
<div *ngIf="error" class="container mx-auto p-4 text-center text-red-500 text-xl">Error: {{ error }}</div>

<div *ngIf="!loading && !error" class="container mx-auto p-4 sm:p-6 lg:p-8">
    <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-8 text-center">
        {{ routeCategory ? 'Products in ' + (routeCategory | titlecase) : 'Our Products' }}
    </h1>

    <div class="mb-10 p-4 sm:p-6 bg-gray-100 rounded-lg shadow-md">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 items-end">
            <!-- Search Input -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                <input type="text" [value]="searchTerm" (input)="handleSearchChange($event)" placeholder="Search..."
                    class="w-full p-2 border border-gray-300 rounded-md shadow-sm" />
            </div>

            <!-- Category Filter -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select [value]="selectedCategory" (change)="handleCategoryChange($event)"
                    class="w-full p-2 border border-gray-300 rounded-md shadow-sm">
                    <option *ngFor="let cat of allAvailableCategories" [value]="cat">
                        {{ cat === 'all' ? 'All Categories' : (cat | titlecase) }}
                    </option>
                </select>
            </div>

            <!-- Price Filter -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Price Range</label>
                <select [value]="selectedPriceRange.label" (change)="handlePriceChange($event)"
                    class="w-full p-2 border border-gray-300 rounded-md shadow-sm">
                    <option *ngFor="let range of priceRanges" [value]="range.label">{{ range.label }}</option>
                </select>
            </div>

            <div>
                <button (click)="clearFilters()"
                    class="w-full bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded-md">Clear Filters</button>
            </div>
        </div>
    </div>

    <div *ngIf="filteredProducts.length > 0"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <app-product-card *ngFor="let prod of filteredProducts" [product]="prod"></app-product-card>
    </div>

    <div *ngIf="filteredProducts.length === 0" class="text-center text-gray-600 text-xl py-10">
        No products found matching your criteria.
    </div>
</div>
