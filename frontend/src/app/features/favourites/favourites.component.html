<div class="max-w-5xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-md mt-8">
    <h2 class="text-2xl font-bold text-gray-800 pb-3 mb-6 border-b border-gray-200">
        Your Favorite Products
    </h2>

    <!-- Loading State -->
    <div *ngIf="loading" class="flex justify-center py-10">
        <div class="animate-spin h-10 w-10 border-4 border-blue-400 border-t-transparent rounded-full"></div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && favorites.length === 0" class="text-center py-10 text-gray-500">
        <p class="text-lg">No favorite products yet.</p>
        <p class="text-sm mt-2">Your favorite items will appear here.</p>
    </div>

    <!-- Favorites Grid -->
    <div *ngIf="!loading && favorites.length > 0" class="grid sm:grid-cols-2 md:grid-cols-3 gap-6">
        <div *ngFor="let product of favorites" class="border rounded-lg p-4 bg-white shadow-sm relative">
            <div class="relative">
                <img *ngIf="product.image" [src]="product.image" [alt]="product.name"
                    class="w-full h-40 object-cover rounded-md" />
                <div *ngIf="!product.image"
                    class="w-full h-40 bg-gray-100 flex items-center justify-center rounded text-sm text-gray-500">No
                    Image</div>

                <button (click)="handleRemoveFavorite(product._id)"
                    class="absolute top-2 right-2 bg-white p-1 rounded-full shadow hover:bg-red-100 transition"
                    aria-label="Remove from favourites">
                    ❌
                </button>
            </div>

            <div class="mt-3 text-center font-semibold text-gray-800">
                {{ product.name || "Unnamed Product" }}
            </div>
        </div>
    </div>
</div>
