<nav [ngClass]="darkMode ? 'bg-gray-900 text-gray-200' : 'bg-white text-gray-800'"
    class="sticky top-0 z-50 shadow-lg backdrop-filter backdrop-blur-sm bg-opacity-90 transition-colors duration-300">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">

            <div class="flex items-center"
                [ngClass]="(isSearchExpanded && windowWidth < 768) ? 'hidden' : 'block md:flex-none'">
                <a routerLink="/" class="flex-shrink-0 flex items-center">
                    <div class="font-bold text-2xl tracking-tighter">
                        <span
                            class="bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">SHOP</span>
                        <span class="text-orange-500">EZ</span>
                    </div>
                </a>
            </div>

            <div class="flex-1 flex justify-center items-center min-w-0 px-2 sm:px-4">
                <form (ngSubmit)="handleSearchSubmit($event)"
                    class="relative transition-all duration-300 ease-in-out flex items-center" [ngClass]="[
                        darkMode ? 'bg-gray-800' : 'bg-gray-100', 
                        isSearchExpanded ? 'w-full md:max-w-md lg:max-w-lg rounded-xl' : 'w-10 h-10 rounded-full cursor-pointer md:w-full md:max-w-md md:rounded-xl'
                      ]">

                    <ng-container *ngIf="isSearchExpanded || windowWidth >= 768; else searchIconOnly">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </div>

                        <input #searchInput name="searchValue" [(ngModel)]="searchValue" type="search"
                            placeholder="Search products..."
                            [ngClass]="darkMode ? 'bg-transparent text-white placeholder-gray-400' : 'bg-transparent text-gray-900 placeholder-gray-500'"
                            class="py-2 pl-10 pr-10 block w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 border-none" />

                        <button *ngIf="isSearchExpanded && windowWidth < 768" type="button" (click)="toggleSearch()"
                            aria-label="Close search"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-gray-400 hover:text-gray-200">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6L6 18M6 6l12 12" />
                            </svg>
                        </button>
                    </ng-container>

                    <ng-template #searchIconOnly>
                        <button type="button" (click)="toggleSearch()" aria-label="Open search"
                            class="p-2 flex items-center justify-center w-full h-full text-gray-500">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </ng-template>
                </form>
            </div>

            <div class="hidden md:flex items-center space-x-4 md:flex-none"
                [ngClass]="(isSearchExpanded && windowWidth < 768) ? 'hidden' : 'flex'">
                <a routerLink="/cart" class="relative group block rounded-full">
                    <div [ngClass]="darkMode ? 'text-gray-300 group-hover:bg-gray-700' : 'text-gray-700 group-hover:bg-gray-200'"
                        class="p-2 rounded-full transition-all duration-300 group-hover:scale-110">
                        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
                        </svg>
                    </div>
                    <span *ngIf="cartCount > 0"
                        class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center shadow-md transition-transform duration-200 group-hover:scale-110">
                        {{ cartCount }}
                    </span>
                </a>
            </div>

        </div>
    </div>
</nav>
